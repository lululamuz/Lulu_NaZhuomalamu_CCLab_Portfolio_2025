<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 2</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="project4-page">
  <main id="content">

    <h1>Question 2 / 8</h1>

    <p class="question-text">
      How uncomfortable are you with starting something imperfectly?
    </p>

    <input type="range" id="slider" min="0" max="100" value="50" />

    <p id="sliderValue"></p>

    <div class="quiz-nav">
      <button id="prevBtn">←</button>
      <button id="nextBtn">→</button>
    </div>

  </main>

  <script>
    const name = localStorage.getItem("userName") || "you";

    const slider = document.getElementById("slider");
    const sliderValue = document.getElementById("sliderValue");
    const reflection = document.getElementById("reflection");

    function getLabel(value) {
      if (value < 20) return "Strongly disagree";
      if (value < 40) return "Disagree";
      if (value < 60) return "Neutral";
      if (value < 80) return "Agree";
      return "Strongly agree";
    }

    function updateUI() {
      const value = Number(slider.value);
      sliderValue.textContent = ": " + getLabel(value);

      if (value < 40) {
        reflection.textContent = name + ", you seem willing to let things begin messy.";
      } else if (value < 70) {
        reflection.textContent = name + ", you can start imperfectly, but it still bothers you.";
      } else {
        reflection.textContent = name + ", maybe perfection is not your standard. Maybe it is your excuse to wait.";
      }
    }

    slider.addEventListener("input", updateUI);
    updateUI();

    document.getElementById("prevBtn").addEventListener("click", function () {
      window.location.href = "quiz2.html";
    });

    document.getElementById("nextBtn").addEventListener("click", function () {
      localStorage.setItem("q2_imperfectStart", slider.value);
      window.location.href = "quiz4.html";
    });
  </script>
</body>
</html>
