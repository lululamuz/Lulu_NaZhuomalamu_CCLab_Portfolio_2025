<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 1</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="project4-page">
  <main id="content">

    <h1>Question 1 / 8</h1>

    <p class="question-text">
      To what degree do you wait for the “right moment” to begin?
    </p>

    <input type="range" id="slider" min="0" max="100" value="50" />

    <p id="sliderValue"></p>
 

    <div class="quiz-nav">
      <button id="prevBtn">←</button>
      <button id="nextBtn">→</button>
    </div>

  </main>

  <script>
    const name = localStorage.getItem("userName") || "you";

    const slider = document.getElementById("slider");
    const sliderValue = document.getElementById("sliderValue");
    const reflection = document.getElementById("reflection");

    function getLabel(value) {
      if (value < 20) return "Strongly disagree";
      if (value < 40) return "Disagree";
      if (value < 60) return "Neutral";
      if (value < 80) return "Agree";
      return "Strongly agree";
    }

    function updateUI() {
      const value = Number(slider.value);
      sliderValue.textContent = ": " + getLabel(value);

      if (value < 40) {
        reflection.textContent = name + ", you seem comfortable starting without waiting.";
      } else if (value < 70) {
        reflection.textContent = name + ", sometimes you wait, sometimes you begin.";
      } else {
        reflection.textContent = name + ", maybe you are not waiting for the right moment. Maybe you are avoiding the first imperfect step.";
      }
    }

    slider.addEventListener("input", updateUI);
    updateUI();

    document.getElementById("prevBtn").addEventListener("click", function () {
      window.location.href = "quiz1.html";
    });

    document.getElementById("nextBtn").addEventListener("click", function () {
      localStorage.setItem("q1_rightMoment", slider.value);
      window.location.href = "quiz3.html";
    });
  </script>
</body>
</html>
